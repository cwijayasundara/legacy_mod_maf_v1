# Codex Project Configuration
# Docs: https://developers.openai.com/codex/config-advanced

[project]
name = "codex-harness"
description = "Codex-native AWS Lambda to Azure Functions migration pipeline with Harness Engine guardrails"

[model]
# Default model for the root/manager agent
# Sub-agents override this in their TOML definitions:
#   analyzer: o4 (judgment — dependency analysis)
#   coder: codex-mini (execution — code generation)
#   tester: o4-mini (moderate reasoning — test execution)
#   reviewer: o4 (judgment — quality assessment)
default = "o4-mini"
reasoning_effort = "high"

[sandbox]
# Default sandbox permissions
# Sub-agents override (analyzer/reviewer use read-only)
mode = "workspace-write"

# Paths that are always read-only regardless of agent permissions
protected_paths = [
    ".git",
    ".codex",
    "src/lambda",           # Original Lambda source is reference-only
    "AGENTS.md",
    "src/*/AGENTS.md",
    "program.md",           # Human steering — only humans edit
    "templates/",           # Contract/failure schemas — reference only
    "state/learned-rules.md"  # Only tester appends rules via protocol
]

[agents]
# Allow 1 level of sub-agent nesting (manager → workers)
max_depth = 1

[context]
# Server-side compaction kicks in when context approaches limit
compact_threshold = "auto"

# AGENTS.md files are loaded hierarchically
# Root AGENTS.md → per-directory AGENTS.md overrides
agents_md = true

# Load program.md for human steering each iteration
load_files = ["program.md", "state/learned-rules.md"]

[tools]
# Built-in tools available to all agents
ripgrep = true        # Fast code search
tree_sitter = true    # AST parsing
file_read = true      # Read files
file_write = true     # Write files (if sandbox allows)

[hooks]
# Post-task hook: lint and typecheck migrated code after each agent completes
post_task = ".codex/scripts/hooks/post-task-lint.js"

# Pre-commit hook: enforce quality gates before any commit
pre_commit = ".codex/scripts/hooks/pre-commit-gate.js"

# Architecture enforcement on file write
check_architecture = ".codex/scripts/hooks/check-architecture.js"

# Type checking on file write
typecheck = ".codex/scripts/hooks/typecheck.js"
