# Copilot Harness — Configuration
# BYOK settings, speed profiles, quality thresholds.

# Copilot CLI BYOK — set via environment variables:
#   COPILOT_PROVIDER_BASE_URL — Azure OpenAI endpoint
#   COPILOT_PROVIDER_TYPE — "azure" | "openai" | "anthropic" | "ollama"
#   COPILOT_PROVIDER_API_KEY — API key
#   COPILOT_MODEL — model/deployment name
#   COPILOT_OFFLINE — "true" to skip GitHub auth

copilot:
  # Max autonomous iterations per migration
  max_autopilot_continues: 20
  # Timeout per module (seconds)
  timeout: 3600
  # Language-specific timeouts
  language_timeouts:
    java: 5400
    csharp: 5400
    python: 3600
    node: 3600

# Quality gates
quality:
  coverage_floor: 80
  reviewer_confidence_threshold: 70
  max_self_healing_attempts: 3
  max_iterations_per_module: 10

# SDK agents (for custom logic beyond CLI auto-delegation)
sdk:
  # Use SDK for security review (more control than CLI)
  security_review_via_sdk: true
  # Model for SDK agents (falls back to COPILOT_MODEL if not set)
  model: null
